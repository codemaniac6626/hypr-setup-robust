general {
    lock_cmd = pidof hyprlock || hyprlock       # dbus/sysd lock command (allows multiple triggers)
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # turn on display after wake
}

# DIM SCREEN (Saves battery on your HP laptop)
listener {
    timeout = 150                                # 2.5 mins
    on-timeout = brightnessctl set 10%           # set monitor backlight to 10%
    on-resume = brightnessctl set 100%           # restore monitor backlight
}

# LOCK SESSION
listener {
    timeout = 300                                # 5 mins
    on-timeout = loginctl lock-session           # lock screen
}

# DPMS (Turn off screen)
listener {
    timeout = 330                                # 5.5 mins
    on-timeout = hyprctl dispatch dpms off       # turn off monitor
    on-resume = hyprctl dispatch dpms on         # turn on monitor
}

# SUSPEND
listener {
    timeout = 600                                # 10 mins
    on-timeout = systemctl suspend               # suspend pc
}
