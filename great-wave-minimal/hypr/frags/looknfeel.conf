general {
    gaps_in = 5
    gaps_out = 20
    border_size = 4
    # col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.active_border = rgb(5f6c8a)
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.9
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 0
        passes = 0
        new_optimizations = true
        ignore_opacity = false
    }
}

animations {
    enabled = yes
    
    # Snappier Beziers
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = quick,0.15,0,0.1,1
    bezier = direct, 0.05, 0.9, 0.1, 1.1 # Added for a slight "pop" without the wait

    # Global speed floor
    animation = global, 1, 2, default
    
    # Windows: Opening, Closing, and Moving
    # Speed 2 is very fast; 1.5 is near-instant
    animation = windows, 1, 2.5, easeOutQuint
    animation = windowsIn, 1, 2.2, easeOutQuint, popin 90%
    animation = windowsOut, 1, 1.2, quick, popin 95%
    animation = windowsMove, 1, 2.0, quick 

    # Fading: Keep these very short so they don't feel "mushy"
    animation = fadeIn, 1, 1.2, quick
    animation = fadeOut, 1, 1.0, quick
    animation = fade, 1, 2.0, quick

    # Layers (Waybar, Rofi, etc.)
    animation = layers, 1, 2.0, easeOutQuint
    animation = layersIn, 1, 2.0, easeOutQuint, fade
    animation = layersOut, 1, 1.0, quick, fade

    # Workspaces: This is usually where "slowness" is most felt
    # A speed of 1.5 - 2.0 makes workspace switching feel lightning fast
    animation = workspaces, 1, 2.0, quick, slide
    animation = workspacesIn, 1, 1.8, quick, slide
    animation = workspacesOut, 1, 1.8, quick, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = false
}
