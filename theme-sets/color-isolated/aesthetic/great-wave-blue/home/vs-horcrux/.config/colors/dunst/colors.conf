[global]
    # Default border outline styling
    frame_color = "#813737"

[urgency_low]
    background = "#401717"
    foreground = "#FFFFFF"

[urgency_normal]
    background = "#1C1E27"
    foreground = "#FFFFFF"

[urgency_critical]
    background = "#111217"
    foreground = "#FFFFFF"
    frame_color = "#BF616A"
