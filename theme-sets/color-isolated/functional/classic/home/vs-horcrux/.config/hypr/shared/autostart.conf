# Example: Uncomment to autostart apps
# exec-once = $terminal
# exec-once = nm-applet &
exec-once = hyprpaper
exec-once = sh /home/vs-horcrux/.config/waybar/launch.sh
exec-once = hypridle

exec-once = sh /home/vs-horcrux/.local/bin/check_update_startup.sh

# Wipe the history on startup
exec-once = cliphist wipe

exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store


# Unlock keyring on startup
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gnome-keyring-daemon --start --components=secrets

exec-once = /home/vs-horcrux/.config/colors/watch.sh
